<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — SimplyIntern</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/search.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="menu_bar">
      <div class="logo">SimplyIntern</div>
      <div class="nav_section"><a href="search.html">Search</a></div>
      <div class="nav_section"><a href="leaderboard.html">Leaderboard</a></div>
      <div class="nav_section"><a href="tracker.html">Tracker</a></div>
      <button class="additional">&#9776;</button>
    </div>

    <div class="page_content">
      <div class="search_engine">
        <input type="text" id="search_input" class="search_input" placeholder="Search internships, companies, or roles..." />
        <div class="search_filters">
          <select class="filter_dropdown" id="filter_location">
            <option value="">Location</option>
            <option value="Remote">Remote</option>
            <option value="New York">New York, NY</option>
            <option value="San Francisco">San Francisco, CA</option>
            <option value="Los Angeles">Los Angeles, CA</option>
            <option value="Chicago">Chicago, IL</option>
            <option value="Boston">Boston, MA</option>
            <option value="Seattle">Seattle, WA</option>
            <option value="Austin">Austin, TX</option>
            <option value="Washington">Washington, DC</option>
          </select>
          <select class="filter_dropdown" id="filter_industry">
            <option value="">Industry</option>
            <option value="tech">Technology</option>
            <option value="medical">Healthcare / Medical</option>
            <option value="finance">Finance / Business</option>
            <option value="marketing">Marketing / Comms</option>
            <option value="legal">Legal / Compliance</option>
            <option value="research">Science / Research</option>
          </select>
          <select class="filter_dropdown" id="filter_type">
            <option value="">Program Type</option>
            <option value="internship">Internship</option>
            <option value="co-op">Co-op</option>
            <option value="externship">Externship</option>
          </select>
          <button class="search_btn" id="search_btn">Search</button>
        </div>
      </div>

      <div class="results_area">
        <div class="empty_state" id="empty_state">
          <p class="empty_title">Find your next internship</p>
          <p class="empty_sub">Use the filters above and click Search to browse listings.</p>
        </div>
        <div class="job_list" id="job_list"></div>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
