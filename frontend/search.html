<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — SimplyIntern</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/search.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="menu_bar">
      <div class="logo">SimplyIntern</div>
      <div class="nav_section"><a href="search.html">Search</a></div>
      <div class="nav_section"><a href="leaderboard.html">Leaderboard</a></div>
      <div class="nav_section"><a href="tracker.html">Tracker</a></div>
      <button class="additional">&#9776;</button>
    </div>

    <div class="page_content">
      <div class="search_engine">
        <input type="text" id="search_input" class="search_input" placeholder="Search internships, companies, or roles..." />
        <div class="search_filters">
          <div class="filter_multi">
            <button type="button" class="filter_multi_btn" id="ms_location_btn"
                    data-all="All Locations" onclick="msToggle('ms_location')">
              <span class="ms_label">All Locations</span>
              <span class="ms_caret">▾</span>
            </button>
            <div class="filter_multi_panel" id="ms_location_panel"></div>
          </div>
          <div class="filter_multi">
            <button type="button" class="filter_multi_btn" id="ms_industry_btn"
                    data-all="All Industries" onclick="msToggle('ms_industry')">
              <span class="ms_label">All Industries</span>
              <span class="ms_caret">▾</span>
            </button>
            <div class="filter_multi_panel" id="ms_industry_panel"></div>
          </div>
          <div class="filter_multi">
            <button type="button" class="filter_multi_btn" id="ms_type_btn"
                    data-all="All Types" onclick="msToggle('ms_type')">
              <span class="ms_label">All Types</span>
              <span class="ms_caret">▾</span>
            </button>
            <div class="filter_multi_panel" id="ms_type_panel"></div>
          </div>
          <button class="search_btn" id="search_btn">Search</button>
        </div>
      </div>

      <div class="results_area">
        <div class="empty_state" id="empty_state">
          <p class="empty_title">Find your next internship</p>
          <p class="empty_sub">Use the filters above and click Search to browse listings.</p>
        </div>
        <div class="job_list" id="job_list"></div>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
