<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimplyIntern</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  </head>

  <body>
    <div class = "background">
        <div class = "login-wrapper">
            <div class = "title">
                <p> Welcome Back</p>
            </div>
            <div class = "info-sections">
                <div class = "input-group">
                    <label for = "username">Username</label>
                    <input 
                        type = "text" 
                        id="username" 
                        name="username" 
                        required/>
                </div>
                <div class = "input-group">
                    <label for = "password">Password</label>
                    <input 
                        type = "password" 
                        id="password" 
                        name="password"  
                        required/>
                </div>
                <div class="log-in-div">
                    <button type = "button" class="ls-button" onclick="logIn()">Log In</button>
                </div>
            </div>
            <div class = "breaker">
                <span>or</span>
            </div>
            <div class="google-div">
                <button type = "button" class="google-button" onclick="googleSignIn()">
                    Continue with Google
                </button>
            </div>
            <div class="sign-up-div">
                <button type = "button" class="ls-button" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
  </body>

</html>
