<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimplyIntern</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/search.css" />
  </head>
  <body> 
    <div class = "menu_bar"> <!-- add js for active nav bar-->
      <div class = "logo">SimplyIntern</div>
      <div class = "nav_section"><a href="search.html">Search</a></div>
      <div class = "nav_section"><a href="tracker.html">Tracker</a></div>
      <div><button class = "additional">☰</button></div>
    </div>
    <div class = "search_menu">
      <div class="search_engine">
        <input type="text" class="search_input" placeholder="Search internships..." />
        <div class="search_filters">
          <select class="filter_dropdown">
            <option value="">📍 Location</option>
            <option>Remote</option>
            <option>New York</option>
            <option>San Francisco</option>
            <option>Chicago</option>
          </select>
          <select class="filter_dropdown">
            <option value="">💼 Job Type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
          </select>
          <select class="filter_dropdown">
            <option value="">💰 Pay Rate</option>
            <option>Unpaid</option>
            <option>$10–$15/hr</option>
            <option>$15–$20/hr</option>
            <option>$20+/hr</option>
          </select>
          <button class="search_btn">Search</button>
        </div>
      </div> 
      <div class = "job_options">
        <div class = "jobs">
          <div class = "left_jobs">
            <div class = "info_title">Job Title</div>
            <div class = "info_company">Company Name</div>
            <div class = "info_location">Location</div>
          </div>
          <div class = "center_jobs">
            <button>FINISHED APPLYING</button>
          </div>
          <div class = "right_jobs">
            <div class = "info_rate">Pay Rate</div>
            <div class = "info_link">Application Link</div>
          </div>
        </div>
    </div>
    </div>
  </body>

</html>
