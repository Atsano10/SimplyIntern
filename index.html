<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimplyIntern</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />

  </head>

  <body>
    <div class = "background">
        <div class = "login-wrapper">
            <div class = "title">
                <p> Welcome Back</p>
            </div>
            <div class = "info-sections">
                <div class = "input-group">
                    <label for = "username">Username</label>
                    <input 
                        type = "text" 
                        id="username" 
                        name="username" 
                        required/>
                </div>
                <div class = "input-group">
                    <label for = "password">Password</label>
                    <input 
                        type = "password" 
                        id="password" 
                        name="password"  
                        required/>
                </div>
                <div class = "log-in-div">
                    <form action = "search.html"><button type = "submit" class = "ls-button">Log In</button></form>
                </div>
            </div>
            <div class = "breaker">
                <span>or</span>
            </div>
            <div class = "sign-up-div">
                <form action="signup.html"><button type = "submit" class = "ls-button">Sign Up</button></form>
            </div>
        </div>
    </div>
  </body>

</html>
